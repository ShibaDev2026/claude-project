spring.application.name=claude-project

# Server Port
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging switch (true = on, false = off)
logging.app.enabled=true
# Logging level: TRACE, DEBUG, INFO, WARN, ERROR
logging.app.level=DEBUG
